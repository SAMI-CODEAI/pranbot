<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI | Emergency Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">🚨</div>
                <div class="logo-text"><span>RESCUE</span></div>
            </div>

            <nav class="nav-links">
                <a href="#" class="active"><i data-lucide="layout-grid"></i> Dashboard</a>
                <a href="#"><i data-lucide="map"></i> Live Map</a>
                <a href="#"><i data-lucide="message-square"></i> Messages</a>
                <a href="#"><i data-lucide="activity"></i> Analytics</a>

            </nav>

            <div class="mesh-status">
                <div class="status-header">MESH NETWORK</div>
                <div class="status-nodes">
                    <div class="node-item online">
                        <span class="pulse"></span> ESP32-Alpha (Gateway)
                    </div>
                    <div class="node-item online">
                        <span class="pulse"></span> ESP32-Beta
                    </div>
                    <div class="node-item online">
                        <span class="pulse"></span> ESP32-Gamma
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-area">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Search distress signals...">
                </div>
                <div class="user-profile">
                    <div class="sys-clock" id="clock">13:59:34</div>
                    <div class="badge">SYSTEM READY</div>
                </div>
            </header>

            <section class="metrics-grid">
                <div class="metric-card" id="card-total">
                    <div class="card-icon"><i data-lucide="users"></i></div>
                    <div class="card-info">
                        <h3>Total Reports</h3>
                        <div class="value" id="stat-total">0</div>
                    </div>
                </div>
                <div class="metric-card warning" id="card-injured">
                    <div class="card-icon"><i data-lucide="alert-circle"></i></div>
                    <div class="card-info">
                        <h3>Injured</h3>
                        <div class="value" id="stat-injured">0</div>
                    </div>
                </div>
                <div class="metric-card danger" id="card-trapped">
                    <div class="card-icon"><i data-lucide="box"></i></div>
                    <div class="card-info">
                        <h3>Trapped</h3>
                        <div class="value" id="stat-trapped">0</div>
                    </div>
                </div>
                <div class="metric-card info" id="card-evacuation">
                    <div class="card-icon"><i data-lucide="truck"></i></div>
                    <div class="card-info">
                        <h3>Needs Evacuation</h3>
                        <div class="value" id="stat-evacuation">0</div>
                    </div>
                </div>
            </section>

            <div class="content-split">
                <!-- Feed Section -->
                <div class="feed-section">
                    <div class="section-header">
                        <h2>Distress Feed</h2>
                        <span class="live-indicator">LIVE</span>
                    </div>
                    <div class="feed-container" id="message-feed">
                        <!-- Messages will appear here -->
                        <div class="feed-placeholder">Waiting for mesh signals...</div>
                    </div>
                </div>

                <!-- Map Section -->
                <div class="map-section">
                    <div class="section-header">
                        <h2>Disaster Hotspots</h2>
                    </div>
                    <div class="map-canvas-container">
                        <canvas id="hotspot-map"></canvas>
                        <div class="map-overlay">
                            <div class="legend">
                                <div class="legend-item"><span class="dot high"></span> High Intensity</div>
                                <div class="legend-item"><span class="dot med"></span> Medium</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
